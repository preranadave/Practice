<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/googlas');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Googlas', sans-serif;
        }

        body {
            background-color: rgb(216, 216, 216);
        }

        .nav-menu {

            display: flex;
            flex-direction: column;
            overflow-y: hidden;
        }

        .menu-item {
            padding: 50px 30px;
            border-bottom: 2px solid #000;
            display: flex;
            position: relative;
            overflow-y: hidden;
        }

        .menu-item a {
            text-decoration: none;
            color: #1f1f1f;
            font-size: 30px;
            line-height: 1;
        }

        .menu-item .img-wrapper {
            position: absolute;
            right: 10%;
            bottom: -250px;
            height: 180px;
            aspect-ratio: 1 / 2;
            pointer-events: none;
        }

        .menu-item .img-wrapper img {
            position: absolute;
            bottom: 0;
            right: 0;
            display: block;
            object-fit: cover;
            transition: all 0.4s ease-in-out;
            height: 100%;
            width: 100%;

        }

        .menu-item:hover .img-wrapper img {
            bottom: 110%;
            rotate: 15deg;
        }

        .menu-item.minus .img-wrapper img {
            rotate: -15deg;
        }
    </style>
</head>

<body>
    <section class="nav-menu">
        <div class="menu-item">
            <a href="#">HOME
                <div class="img-wrapper">
                    <img src="https://github.com/5thAttemptCode/Codepen/blob/main/Images/img2.png?raw=true" alt=""
                        class="menu-img">
                </div>
            </a>
        </div>
        <div class="menu-item minus">
            <a href="#">HOME
                <div class="img-wrapper">
                    <img src="https://github.com/5thAttemptCode/Codepen/blob/main/Images/img2.png?raw=true" alt=""
                        class="menu-img">
                </div>
            </a>
        </div>
    </section>
</body>

</html>
