<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<body>

    <title>Document</title>
    <style>
        /* button wipe effect strat */
        * {
            margin: 0;
            padding: 0;
            text-align: center;
        }

        button {
            position: relative;
            overflow: hidden;
            margin-top: 100px;
            padding: 20px 60px;
            font-weight: 900;
            font-size: 2em;
            border-radius: 5px;
            border: 0;
            color: #FFC475;
            text-transform: uppercase;
            box-shadow: -2px 2px 2px #ccc;
            background-color: #FFF45F;
        }

        /*        sheen effect      */
        /*This is the base aniamtion*/
        .sheen:after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            bottom: -50%;
            left: -50%;
            background: linear-gradient(to bottom, rgba(229, 172, 142, 0), rgba(255, 255, 255, 0.5) 50%, rgba(229, 172, 142, 0));
            transform: rotateZ(60deg) translate(-5em, 7.5em);
        }

        /*This activates the sheen once the button has been hovered*/
        .sheen:hover::after,
        button:focus::after {
            animation: sheen 1s forwards;
        }

        @keyframes sheen {
            100% {
                transform: rotateZ(60deg) translate(1em, -9em);
            }
        }

        button:active {
            /* box-shadow: 0px 0px 0px white;
            -webkit-box-shadow: inset -2px 2px 2px #ccc;
            -moz-box-shadow: inset -2px 2px 2px #ccc;
            box-shadow: inset -2px 2px 2px #ccc;
            transform: translate(0, 2px);
            color: #FFC491;
            background-color: #EDE358; */
        }

        button:focus {
            outline: 0;
        }

        /* button wipe effect end */
    </style>
</head>

<body>
